jenkins:
  systemMessage: "Jenkins configurado automaticamente via CasC!"

  numExecutors: 1

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: ${JENKINS_ADM_USER}
          password: ${JENKINS_ADM_PASSWORD}

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: "gmail-user"
              secret: "${GMAIL_USER}"
              description: "Email remetente Gmail"
          - string:
              id: "gmail-pass"
              secret: "${GMAIL_PASS}"
              description: "Senha de app Gmail"
          - string:
              id: "email-destinatario"
              secret: "${EMAIL_DESTINATARIO}"
              description: "Email destinatário"
          - string:
              id: "mongo-user"
              secret: "${MONGO_INITDB_ROOT_USERNAME}"
              description: "MongoDB usuário"
          - string:
              id: "mongo-pass"
              secret: "${MONGO_INITDB_ROOT_PASSWORD}"
              description: "MongoDB senha"
          - string:
              id: "mongo-db"
              secret: "${MONGO_INITDB_DATABASE}"
              description: "MongoDB database"

jobs:
  - script: >
      pipelineJob('run-pipeline') {
        quietPeriod(0)
        triggers {
          cron('* * * * *')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/Fefeeu/S07-Testes_API_dnd.git')
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
